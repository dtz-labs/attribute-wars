name: ci

on:
  push:
  pull_request:

# Least-privilege token: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: host unit tests (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run host unit tests
        # test/run.sh builds every test_*.c natively with -Wall -Wextra -Werror
        # and runs it -- no Z80 toolchain needed. This is also the hard lint gate.
        run: ./test/run.sh

  build-tap:
    name: build TAPs (z88dk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compile with z88dk (official Docker image)
        # Checkout runs on the host runner (which has Node for the JS action),
        # then the build runs inside the z88dk image. The Makefile skips its
        # local PATH/ZCCCFG export when ~/Programowanie/z88dk is absent and uses
        # the image's preset toolchain instead. Python layout checks run in the
        # next steps because the z88dk image does not ship python3.
        run: >
          docker run --rm -v "$PWD":/src -w /src z88dk/z88dk:latest
          make all CHECK_ZX128_LAYOUT=: CHECK_ZX_STACK_LAYOUT=:
      - name: Validate ZX stack layout
        run: |
          set -eu
          tools/check_zx_stack_layout.py build/*-timex.map
          tools/check_zx_stack_layout.py build/*-zx48k.map
      - name: Validate ZX128 memory layout
        run: |
          set -eu
          map_files=(build/*-zx128k.map)
          test "${#map_files[@]}" -eq 1
          tools/check_zx128_layout.py "${map_files[0]}"
      - name: Upload TAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: attribute-wars-taps
          path: build/*.tap
          if-no-files-found: error

  lint:
    name: cppcheck (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Static analysis
        # Advisory only: the host -Werror build is the hard gate. cppcheck adds a
        # second opinion on the pure-logic C. `|| true` keeps it non-blocking;
        # drop that once the codebase is clean to make it enforcing.
        run: |
          cppcheck --std=c99 --enable=warning,portability,performance \
            --inline-suppr --suppress=missingIncludeSystem \
            -I include src test || true
