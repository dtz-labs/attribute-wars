name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release TAP binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile TAP files with z88dk
        run: >
          docker run --rm -v "$PWD":/src -w /src z88dk/z88dk:latest
          make all CHECK_ZX128_LAYOUT=:

      - name: Validate ZX128 memory layout
        run: |
          set -eu
          map_files=(build/*-zx128k.map)
          test "${#map_files[@]}" -eq 1
          tools/check_zx128_layout.py "${map_files[0]}"

      - name: Package TAP files
        run: |
          set -eu
          mkdir -p dist
          tap_files=(build/*.tap)
          test "${#tap_files[@]}" -eq 3
          zip -j "dist/attribute-wars-${GITHUB_REF_NAME}-taps.zip" \
            "${tap_files[@]}"
          unzip -l "dist/attribute-wars-${GITHUB_REF_NAME}-taps.zip"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Attribute Wars ${GITHUB_REF_NAME}" \
              --notes "Binary TAP files for Attribute Wars ${GITHUB_REF_NAME}." \
              --verify-tag
          fi
